# ==============================================================================
# MyWorld Production Deployment Workflow
# ==============================================================================
# This workflow automatically deploys to DigitalOcean when pushing to main.
#
# Required GitHub Secrets:
#   DO_HOST        - Droplet IP address
#   DO_SSH_KEY     - Private SSH key for deploy user
#   DO_SSH_PORT    - SSH port (default: 2222)
#
# Setup:
#   1. Generate SSH key: ssh-keygen -t ed25519 -C "github-actions"
#   2. Add public key to server: /home/deploy/.ssh/authorized_keys
#   3. Add private key to GitHub Secrets as DO_SSH_KEY
#   4. Add droplet IP to GitHub Secrets as DO_HOST
# ==============================================================================

name: Deploy to Production

on:
  # Deploy on push to main branch
  push:
    branches:
      - main

  # Allow manual deployment
  workflow_dispatch:
    inputs:
      quick_deploy:
        description: 'Skip dependency installation'
        required: false
        default: 'false'
        type: boolean

# Prevent concurrent deployments
concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Test Job (runs before deployment)
  # ============================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Run tests
        run: |
          pip install pytest pytest-flask
          pytest tests/ -v --tb=short
        continue-on-error: true

  # ============================================================================
  # Deploy Job
  # ============================================================================
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: deploy
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 2222 }}
          script_stop: true
          script: |
            echo "=========================================="
            echo "Starting deployment at $(date)"
            echo "=========================================="

            # Navigate to application directory
            cd /var/www/myworld/app

            # Store current commit for rollback
            CURRENT_COMMIT=$(git rev-parse HEAD)
            echo "Current commit: $CURRENT_COMMIT"

            # Fetch and reset to latest
            echo "Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main

            NEW_COMMIT=$(git rev-parse HEAD)
            echo "New commit: $NEW_COMMIT"

            # Check if we actually updated
            if [ "$CURRENT_COMMIT" = "$NEW_COMMIT" ]; then
              echo "No changes to deploy"
              exit 0
            fi

            # Show what changed
            echo "Changes:"
            git log --oneline ${CURRENT_COMMIT}..${NEW_COMMIT}

            # Activate virtual environment
            source venv/bin/activate

            # Install dependencies (skip if quick deploy)
            if [ "${{ github.event.inputs.quick_deploy }}" != "true" ]; then
              echo "Installing dependencies..."
              pip install -r requirements.txt --quiet
            else
              echo "Skipping dependency installation (quick deploy)"
            fi

            # Restart application
            echo "Restarting application..."
            sudo systemctl restart myworld

            # Wait for startup
            sleep 3

            # Health check
            echo "Running health check..."
            if curl -sf http://127.0.0.1:8000/ > /dev/null; then
              echo "Health check passed!"
            else
              echo "Health check failed! Rolling back..."
              git reset --hard $CURRENT_COMMIT
              pip install -r requirements.txt --quiet
              sudo systemctl restart myworld
              echo "Rolled back to $CURRENT_COMMIT"
              exit 1
            fi

            echo "=========================================="
            echo "Deployment completed successfully!"
            echo "Commit: $NEW_COMMIT"
            echo "=========================================="

      - name: Deployment notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment successful"
          else
            echo "❌ Deployment failed"
          fi

  # ============================================================================
  # Rollback Job (manual trigger only)
  # ============================================================================
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && failure()
    needs: deploy

    steps:
      - name: Rollback to previous version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: deploy
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_SSH_PORT || 2222 }}
          script: |
            cd /var/www/myworld/app
            echo "Rolling back..."

            # Get previous commit
            PREVIOUS_COMMIT=$(git rev-parse HEAD~1)
            git reset --hard $PREVIOUS_COMMIT

            source venv/bin/activate
            pip install -r requirements.txt --quiet
            sudo systemctl restart myworld

            echo "Rolled back to: $PREVIOUS_COMMIT"
