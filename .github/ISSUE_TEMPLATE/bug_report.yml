name: Bug Report
description: Report a bug or unexpected behavior in MyWorld
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for reporting a bug!
        Please fill out this form to help us fix the issue quickly.

        > **Security Issues:** Do NOT report security vulnerabilities here. Email [moner.aldabai@gmail.com](mailto:moner.aldabai@gmail.com) instead.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues and this bug hasn't been reported
          required: true
        - label: I am using the latest version of MyWorld
          required: true
        - label: This is not a security vulnerability (those should be emailed privately)
          required: true

  - type: input
    id: version
    attributes:
      label: MyWorld Version
      description: Which version are you using? (Help > About)
      placeholder: "e.g., 2.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which Windows version are you using?
      options:
        - Windows 11 (64-bit)
        - Windows 10 (64-bit)
        - Windows 10 (32-bit)
        - Other (specify in description)
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical - Data loss or security issue
        - High - Major feature broken
        - Medium - Feature partially broken
        - Low - Minor inconvenience
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: "Describe the bug..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior
      placeholder: |
        1. Open MyWorld
        2. Go to '...'
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "I expected..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "Instead, what happened was..."
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem
      placeholder: "Drag and drop images here or paste URLs"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: If available, paste any error messages or logs
      placeholder: "Paste error messages here..."
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information that might help us fix this bug
      placeholder: "Add any other context here..."
    validations:
      required: false

  - type: dropdown
    id: help
    attributes:
      label: Would you like to help fix this bug?
      description: We welcome contributions!
      options:
        - "Yes, I'd like to help if possible"
        - "No, I just want to report it"
    validations:
      required: false
