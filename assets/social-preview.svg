<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-gradient)"/>

  <!-- Grid pattern -->
  <g stroke="#1a1a2e" stroke-width="1" opacity="0.3">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.1"/>
  <circle cx="1180" cy="540" r="250" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.1"/>

  <!-- Logo container -->
  <g transform="translate(640, 200)">
    <!-- Outer glow ring -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="#4ade80" stroke-width="8" opacity="0.15"/>
    <circle cx="0" cy="0" r="95" fill="none" stroke="#4ade80" stroke-width="4" opacity="0.3"/>

    <!-- Main circle -->
    <circle cx="0" cy="0" r="90" fill="#0d1117" stroke="#4ade80" stroke-width="3" filter="url(#glow)"/>

    <!-- Inner ring -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="#22543d" stroke-width="1.5" opacity="0.7"/>

    <!-- Shield -->
    <polygon points="-35,5 0,-15 35,5 35,35 0,70 -35,35" fill="#0d2818" opacity="0.9"/>
    <polygon points="-35,5 0,-15 35,5 35,35 0,70 -35,35" fill="none" stroke="#4ade80" stroke-width="2.5" filter="url(#glow)"/>

    <!-- MW Letters -->
    <polyline points="-18,55 -18,25 -9,38 0,25 0,55" fill="none" stroke="#86efac" stroke-width="2.5" stroke-linejoin="miter" filter="url(#text-glow)"/>
    <polyline points="5,25 9,55 14,41 19,55 24,25" fill="none" stroke="#86efac" stroke-width="2.5" stroke-linejoin="miter" filter="url(#text-glow)"/>

    <!-- Lock shackle -->
    <path d="M -8,-25 A 8,8 0 0,1 8,-25" fill="none" stroke="#4ade80" stroke-width="2" filter="url(#glow)"/>
    <line x1="-8" y1="-25" x2="-8" y2="-15" stroke="#4ade80" stroke-width="2"/>
    <line x1="8" y1="-25" x2="8" y2="-15" stroke="#4ade80" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="640" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff" filter="url(#text-glow)">MyWorld</text>

  <!-- Subtitle -->
  <text x="640" y="420" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="400" fill="#9ca3af">Secure, Fast &amp; Offline Password Manager</text>

  <!-- Feature badges -->
  <g transform="translate(640, 500)">
    <!-- AES-256 -->
    <g transform="translate(-280, 0)">
      <rect x="-70" y="-18" width="140" height="36" rx="18" fill="#166534" opacity="0.8"/>
      <text x="0" y="6" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#86efac">AES-256</text>
    </g>

    <!-- Offline -->
    <g transform="translate(-90, 0)">
      <rect x="-60" y="-18" width="120" height="36" rx="18" fill="#1e3a5f" opacity="0.8"/>
      <text x="0" y="6" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#93c5fd">100% Offline</text>
    </g>

    <!-- No Telemetry -->
    <g transform="translate(90, 0)">
      <rect x="-65" y="-18" width="130" height="36" rx="18" fill="#7f1d1d" opacity="0.8"/>
      <text x="0" y="6" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#fca5a5">No Telemetry</text>
    </g>

    <!-- Windows -->
    <g transform="translate(280, 0)">
      <rect x="-60" y="-18" width="120" height="36" rx="18" fill="#1e40af" opacity="0.8"/>
      <text x="0" y="6" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#bfdbfe">Windows</text>
    </g>
  </g>

  <!-- Bottom URL -->
  <text x="640" y="590" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#6b7280">github.com/moneraldabai-ui/MyWorld</text>
</svg>
